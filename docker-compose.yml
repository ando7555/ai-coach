services:
  neo4j:
    image: neo4j:5
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/ai-coach
    volumes:
      - neo4j_data:/data

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      SPRING_NEO4J_URI: bolt://neo4j:7687
      GOOGLE_GEMINI_API_KEY: ${GOOGLE_GEMINI_API_KEY}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      - neo4j

volumes:
  neo4j_data:
