<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: white;
    padding: 0;
  }
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
  }
  .cell {
    border: 1px solid #eee;
  }
  .cell img {
    width: 100%;
    display: block;
  }
</style>
</head>
<body>
<div class="grid">
  <div class="cell"><img src="diagram-1.png"></div>
  <div class="cell"><img src="diagram-2.png"></div>
  <div class="cell"><img src="diagram-3.png"></div>
  <div class="cell"><img src="diagram-4.png"></div>
  <div class="cell"><img src="diagram-5.png"></div>
  <div class="cell"><img src="diagram-6.png"></div>
</div>
</body>
</html>
