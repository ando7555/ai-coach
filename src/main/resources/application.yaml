spring:
  ai:
    openai:
      api-key: ${GOOGLE_GEMINI_API_KEY}
      base-url: https://generativelanguage.googleapis.com/v1beta/openai
      chat:
        completions-path: /chat/completions
        options:
          model: gemini-2.5-flash
          temperature: 0.7
    retry:
      max-attempts: 3
      backoff:
        initial-interval: 2s
        multiplier: 2
        max-interval: 15s
      on-client-errors: false

  neo4j:
    uri: bolt://localhost:7687
    authentication:
      username: neo4j
      password: ai-coach   # change this

  graphql:
    schema:
      locations: classpath:graphql/
    graphiql:
      enabled: true

jwt:
  secret: ${JWT_SECRET:ai-coach-default-secret-key-change-in-production-min-32-chars}
  expiration-ms: 86400000

server:
  port: 8080
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true

