spring:
  ai:
    openai:
      api-key: ${GOOGLE_GEMINI_API_KEY:disabled}
      base-url: https://generativelanguage.googleapis.com/v1beta/openai
      chat:
        completions-path: /chat/completions
        options:
          model: gemini-2.5-flash
          temperature: 0.7
    retry:
      max-attempts: 3
      backoff:
        initial-interval: 2s
        multiplier: 2
        max-interval: 15s
      on-client-errors: false

  neo4j:
    uri: ${NEO4J_URI:bolt://127.0.0.1:7687}
    authentication:
      username: neo4j
      password: ai-coach   # change this

  graphql:
    schema:
      locations: classpath:graphql/
    graphiql:
      enabled: true

jwt:
  secret: ${JWT_SECRET:ai-coach-default-secret-key-change-in-production-min-32-chars}
  expiration-ms: 86400000

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

pitchmind:
  predictor:
    model-name: Transparent Poisson Baseline
    model-version: baseline-poisson-v1
    min-team-matches: 3
    min-global-matches: 6
    min-venue-matches: 2
    recent-match-window: 5
    recent-weight: 0.65
    league-average-fallback-goals: 1.35
    min-expected-goals: 0.2
    max-expected-goals: 4.5
    max-goals: 8
    normalization-tolerance: 0.000001
    high-confidence-sample-size: 10
    medium-confidence-sample-size: 6
    high-separation-threshold: 0.18
    medium-separation-threshold: 0.08
  betting:
    potential-value-threshold: 0.08
    weak-value-threshold: 0.0
    high-uncertainty-probability-threshold: 0.05

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true

